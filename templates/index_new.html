<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>晓波智能资讯站 | AI科技金融前沿</title>
    <meta name="description" content="每日更新 AI 科技、股票投资、金融资讯">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --primary: #FF4D4F;
            --primary-dark: #cf1322;
            --accent: #1890FF;
            --bg: #F5F5F5;
            --card-bg: #FFFFFF;
            --text: #1F1F1F;
            --text-secondary: #8C8C8C;
            --text-tertiary: #BFBFBF;
            --border: #E8E8E8;
            --divider: #F0F0F0;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.12);
            --radius: 12px;
            --radius-sm: 8px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'SF Pro Text', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* 顶部搜索栏 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, #FF4D4F 0%, #FF7A45 100%);
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
        }
        
        .header-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .search-bar {
            flex: 1;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .search-bar i { font-size: 14px; }
        
        /* 分类导航 */
        .category-nav {
            background: var(--card-bg);
            position: sticky;
            top: calc(36px + 12px + max(12px, env(safe-area-inset-top)));
            z-index: 99;
            border-bottom: 1px solid var(--divider);
        }
        
        .category-scroll {
            display: flex;
            overflow-x: auto;
            padding: 0 12px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .category-scroll::-webkit-scrollbar { display: none; }
        
        .category-item {
            flex-shrink: 0;
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            white-space: nowrap;
        }
        
        .category-item.active {
            color: var(--primary);
            font-weight: 600;
        }
        
        .category-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
        }
        
        /* 顶部轮播图 */
        .banner {
            margin: 12px;
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            height: 180px;
        }
        
        .banner-slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .banner-slide.active { opacity: 1; }
        
        .banner-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 16px 16px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: #fff;
        }
        
        .banner-title {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .banner-dots {
            position: absolute;
            bottom: 12px;
            right: 12px;
            display: flex;
            gap: 6px;
        }
        
        .banner-dot {
            width: 6px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.5);
            transition: all 0.3s;
        }
        
        .banner-dot.active {
            width: 16px;
            background: #fff;
        }
        
        /* 热点推荐 */
        .section {
            background: var(--card-bg);
            margin-bottom: 12px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid var(--divider);
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 600;
        }
        
        .section-title i {
            color: var(--primary);
        }
        
        .section-more {
            font-size: 13px;
            color: var(--text-tertiary);
        }
        
        .hot-list {
            padding: 12px 16px;
        }
        
        .hot-item {
            display: flex;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid var(--divider);
        }
        
        .hot-item:last-child { border-bottom: none; }
        
        .hot-rank {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .hot-rank.top3 {
            background: linear-gradient(135deg, #FF4D4F, #FF7A45);
            color: #fff;
        }
        
        .hot-rank.other {
            background: var(--divider);
            color: var(--text-tertiary);
        }
        
        .hot-content { flex: 1; min-width: 0; }
        
        .hot-title {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .hot-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            font-size: 12px;
            color: var(--text-tertiary);
        }
        
        /* 文章卡片 */
        .feed-list {
            padding: 0;
        }
        
        .feed-card {
            display: flex;
            padding: 16px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--divider);
            gap: 12px;
        }
        
        .feed-card:active { background: #fafafa; }
        
        .feed-card-img {
            width: 100px;
            height: 75px;
            border-radius: var(--radius-sm);
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }
        
        .feed-card-img.placeholder {
            background: linear-gradient(135deg, #f0f0f0, #e8e8e8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            font-size: 24px;
        }
        
        .feed-card-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .feed-card-title {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .feed-card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-tertiary);
        }
        
        .feed-card-tag {
            color: var(--primary);
            font-weight: 500;
        }
        
        /* 底部Tab */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-top: 1px solid var(--divider);
            display: flex;
            padding: 8px 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }
        
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-tertiary);
            font-size: 10px;
            cursor: pointer;
        }
        
        .tab-item i { font-size: 20px; }
        
        .tab-item.active {
            color: var(--primary);
        }
        
        .tab-item.active i { font-weight: 600; }
        
        /* 加载更多 */
        .load-more {
            padding: 20px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 13px;
        }
        
        .load-more.loading::after {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--divider);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 空状态 */
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-tertiary);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        /* 响应式 */
        @media (min-width: 768px) {
            .container {
                max-width: 600px;
                margin: 0 auto;
            }
            .header, .category-nav { max-width: 600px; left: 50%; transform: translateX(-50%); }
            .tab-bar { max-width: 600px; left: 50%; transform: translateX(-50%); }
        }
    </style>
</head>
<body>
    <!-- 顶部搜索栏 -->
    <header class="header">
        <div class="header-content">
            <div class="logo">🤖</div>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <span>搜索资讯、股票...</span>
            </div>
        </div>
    </header>
    
    <!-- 分类导航 -->
    <nav class="category-nav">
        <div class="category-scroll" id="categoryList">
            <div class="category-item active" data-category="all">全部</div>
            <div class="category-item" data-category="AI科技">AI前沿</div>
            <div class="category-item" data-category="科技产业">科技产业</div>
            <div class="category-item" data-category="智能金融速递">金融</div>
            <div class="category-item" data-category="优质RSS源">创投</div>
            <div class="category-item" data-category="今日重大事件">要闻</div>
        </div>
    </nav>
    
    <div class="container" style="padding-bottom: 70px;">
        <!-- 轮播图 -->
        <div class="banner" id="banner">
            <div class="banner-slide active" style="background-image: linear-gradient(135deg, #667eea, #764ba2);">
                <div class="banner-content">
                    <div class="banner-title">AI浪潮来袭：2026科技新趋势</div>
                </div>
            </div>
            <div class="banner-slide" style="background-image: linear-gradient(135deg, #f093fb, #f5576c);">
                <div class="banner-content">
                    <div class="banner-title">深度解读：Claude为何登顶App Store</div>
                </div>
            </div>
            <div class="banner-slide" style="background-image: linear-gradient(135deg, #4facfe, #00f2fe);">
                <div class="banner-content">
                    <div class="banner-title">港股开户指南：低佣金交易攻略</div>
                </div>
            </div>
            <div class="banner-dots">
                <div class="banner-dot active"></div>
                <div class="banner-dot"></div>
                <div class="banner-dot"></div>
            </div>
        </div>
        
        <!-- 热点推荐 -->
        <section class="section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fas fa-fire"></i>
                    热点推荐
                </div>
                <span class="section-more">更多 ></span>
            </div>
            <div class="hot-list" id="hotList">
                <!-- 热点内容 -->
            </div>
        </section>
        
        <!-- 资讯流 -->
        <section class="section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fas fa-newspaper"></i>
                    最新资讯
                </div>
            </div>
            <div class="feed-list" id="feedList">
                <!-- 资讯卡片 -->
            </div>
        </section>
        
        <!-- 加载更多 -->
        <div class="load-more" id="loadMore">
            上拉加载更多
        </div>
    </div>
    
    <!-- 底部Tab -->
    <nav class="tab-bar">
        <div class="tab-item active">
            <i class="fas fa-home"></i>
            <span>首页</span>
        </div>
        <div class="tab-item">
            <i class="fas fa-chart-line"></i>
            <span>行情</span>
        </div>
        <div class="tab-item">
            <i class="fas fa-bolt"></i>
            <span>快讯</span>
        </div>
        <div class="tab-item">
            <i class="fas fa-user"></i>
            <span>我的</span>
        </div>
    </nav>
    
    <script>
        // 文章数据
        const articles = [
            { id: 1, title: 'Claude登顶App Store：AI应用迎来爆发期', category: 'AI科技', source: '36氪', time: '2小时前', image: null },
            { id: 2, title: '英伟达将推出新一代推理芯片，性能提升10倍', category: '科技产业', source: '爱范儿', time: '3小时前', image: null },
            { id: 3, title: '小米Vision GT概念超跑亮相，造型炫酷', category: '科技产业', source: 'ifanr', time: '5小时前', image: null },
            { id: 4, title: 'Apple Watch或支持指纹识别，交互再升级', category: '科技产业', source: '少数派', time: '6小时前', image: null },
            { id: 5, title: '蔚来李斌获中国人工智能最高奖', category: 'AI科技', source: '量子位', time: '8小时前', image: null },
            { id: 6, title: 'GitHub年度开发者报告：AI工具成必选项', category: '优质RSS源', source: '开源中国', time: '10小时前', image: null },
            { id: 7, title: 'A股收盘：沪指涨0.5%，新能源板块领涨', category: '智能金融速递', source: '智能金融', time: '1天前', image: null },
            { id: 8, title: 'OpenClaw V2发布：智能化程度大幅提升', category: 'AI科技', source: '掘金', time: '1天前', image: null },
            { id: 9, title: '微信鸿蒙版上线：纯血鸿蒙生态完善', category: '科技产业', source: '36氪', time: '1天前', image: null },
            { id: 10, title: '深度学习框架新格局：PyTorch与TensorFlow二分天下', category: 'AI科技', source: 'AI科技', time: '2天前', image: null },
        ];
        
        // 热点数据
        const hotArticles = articles.slice(0, 5);
        
        // 渲染热点
        function renderHot() {
            const hotList = document.getElementById('hotList');
            hotList.innerHTML = hotArticles.map((article, index) => `
                <div class="hot-item">
                    <div class="hot-rank ${index < 3 ? 'top3' : 'other'}">${index + 1}</div>
                    <div class="hot-content">
                        <div class="hot-title">${article.title}</div>
                        <div class="hot-meta">
                            <span>${article.source}</span>
                            <span>•</span>
                            <span>${article.time}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 渲染资讯流
        function renderFeed(category = 'all', page = 1) {
            const feedList = document.getElementById('feedList');
            const filtered = category === 'all' ? articles : articles.filter(a => a.category === category);
            const pageSize = 10;
            const start = (page - 1) * pageSize;
            const pageData = filtered.slice(start, start + pageSize);
            
            if (page === 1) {
                feedList.innerHTML = '';
            }
            
            if (pageData.length === 0) {
                feedList.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无资讯</p></div>';
                return;
            }
            
            feedList.innerHTML += pageData.map(article => `
                <div class="feed-card">
                    <div class="feed-card-img ${article.image ? '' : 'placeholder'}">
                        ${article.image ? '' : '📰'}
                    </div>
                    <div class="feed-card-content">
                        <div class="feed-card-title">${article.title}</div>
                        <div class="feed-card-meta">
                            <span class="feed-card-tag">${article.category}</span>
                            <span>${article.source}</span>
                            <span>${article.time}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            // 更新加载状态
            const loadMore = document.getElementById('loadMore');
            if (start + pageSize >= filtered.length) {
                loadMore.textContent = '没有更多了';
                loadMore.classList.remove('loading');
            } else {
                loadMore.textContent = '上拉加载更多';
            }
        }
        
        // 分类切换
        let currentCategory = 'all';
        document.getElementById('categoryList').addEventListener('click', (e) => {
            if (e.target.classList.contains('category-item')) {
                document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.category;
                renderFeed(currentCategory, 1);
            }
        });
        
        // 轮播图自动切换
        let currentSlide = 0;
        const slides = document.querySelectorAll('.banner-slide');
        const dots = document.querySelectorAll('.banner-dot');
        
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            dots[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
            dots[currentSlide].classList.add('active');
        }, 4000);
        
        // 初始化
        renderHot();
        renderFeed();
    </script>
</body>
</html>
